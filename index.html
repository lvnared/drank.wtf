    <script>
      (function () {
        const url = new URL(window.location.href);
        const redirectedPath = url.searchParams.get('p');

        if (!redirectedPath) {
          return;
        }

        const redirectedQuery = url.searchParams.get('q');
        const nextPath = redirectedPath.startsWith('/') ? redirectedPath : `/${redirectedPath}`;
        const nextUrl = `${nextPath}${redirectedQuery ? `?${redirectedQuery}` : ''}${url.hash}`;

        window.history.replaceState(null, '', nextUrl);
      })();
    </script>
